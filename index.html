<!DOCTYPE html>
<html lang="uk" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ромасяй">
    <link rel="apple-touch-icon" href="https://iili.io/qKRx5xI.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" id="theme-color-meta" content="#f8fafc">
    <title>Ромасяй Cloud v20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { darkMode: 'class' } </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.8); --border: rgba(255, 255, 255, 0.5); --bg-grad-1: #f8fafc; --bg-grad-2: #e2e8f0; --text-main: #1e293b; --primary: #2563eb; }
        .dark { --glass: rgba(15, 23, 42, 0.8); --border: rgba(255, 255, 255, 0.1); --bg-grad-1: #0f172a; --bg-grad-2: #1e293b; --text-main: #f8fafc; --primary: #60a5fa; }
        
        .theme-white { --bg-grad-1: #f8fafc; --bg-grad-2: #e2e8f0; }
        .theme-pink { --bg-grad-1: #fdf2f8; --bg-grad-2: #fbcfe8; --text-main: #831843; --primary: #db2777; }
        .theme-lemon { --bg-grad-1: #fefce8; --bg-grad-2: #fef08a; --text-main: #713f12; --primary: #ca8a04; }
        .theme-blue { --bg-grad-1: #f0f9ff; --bg-grad-2: #bae6fd; --text-main: #0c4a6e; --primary: #0284c7; }
        .theme-blue-yellow { --bg-grad-1: #bae6fd; --bg-grad-2: #fef08a; --text-main: #1e293b; }
        .theme-black-blue { --bg-grad-1: #020617; --bg-grad-2: #0f172a; --text-main: #f8fafc; --primary: #60a5fa; }
        .theme-black-red { --bg-grad-1: #2a0808; --bg-grad-2: #000000; --text-main: #fecaca; --primary: #f87171; }
        .theme-green-black { --bg-grad-1: #064e3b; --bg-grad-2: #020617; --text-main: #a7f3d0; --primary: #34d399; }

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--bg-grad-1); /* Фікс білої полоси */
        }
        body { 
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%) no-repeat fixed; 
            font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; 
            color: var(--text-main); width: 100%; 
            user-select: none; -webkit-user-select: none; 
        }

        .glass { background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .ios-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .ios-card:active { transform: scale(0.94); opacity: 0.8; }

        .app-screen { display: none; min-height: 100dvh; width: 100vw; flex-direction: column; }
        .app-screen.active { display: flex; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        
        /* Стандартний відступ для основного екрану */
        .safe-pt { padding-top: calc(env(safe-area-inset-top) + 0.5rem); }
        
        /* СПЕЦІАЛЬНИЙ ВІДСТУП ДЛЯ НАЛАШТУВАНЬ ТА АРХІВУ (нижче стрілка) */
        .settings-header { 
            padding-top: calc(env(safe-area-inset-top) + 1.2rem) !important; 
            padding-bottom: 1rem;
        }

        .icon-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .icon-btn svg { width: 24px; height: 24px; stroke-width: 3px; }

        #splashScreen.splash-hide { opacity: 0; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body class="theme-white">
    <div id="splashScreen" onclick="dismissSplash()" class="fixed inset-0 bg-black/5 backdrop-blur-2xl flex flex-col items-center justify-center z-[9999]">
        <img src="https://iili.io/qKRx5xI.png" class="w-40 h-40 object-contain rounded-3xl shadow-xl animate-pulse">
        <div class="mt-8 px-6 py-3 glass rounded-full font-black text-sm animate-bounce">👆 ТОРКНІТЬСЯ</div>
    </div>

    <div id="menuScreen" class="app-screen">
        <div class="scroll-area px-5 pt-10 safe-pt">
            <div class="flex justify-between items-center mb-6">
                <div id="userBadgeContainer" class="hidden flex items-center">
                    <span id="displayUserMenu" class="text-xs font-black bg-[var(--primary)] text-white px-3 py-1.5 rounded-full uppercase shadow-sm"></span>
                    <button onclick="logout()" class="text-[10px] font-bold opacity-40 uppercase ml-2">Вийти</button>
                </div>
                <div class="flex-1"></div>
                <button onclick="nav('settingsScreen')" class="glass w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-sm">🎨</button>
            </div>
            <div class="text-center mb-12">
                <h1 class="text-5xl font-black tracking-tight">Ромасяй</h1>
                <p class="text-xs font-black opacity-30 uppercase tracking-[0.3em] mt-1">Cloud Inventory</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startInventoryFlow()" class="glass p-8 rounded-[35px] flex flex-col items-center justify-center gap-3 ios-card col-span-2 shadow-sm bg-[var(--primary)]/5">
                    <span class="text-4xl">📝</span><span class="font-black text-lg">Почати</span>
                </button>
                <button onclick="nav('archiveScreen'); loadArchive();" class="glass p-6 rounded-[35px] flex flex-col items-center justify-center gap-2 ios-card shadow-sm"><span class="text-3xl">📦</span><span class="font-black">Архів</span></button>
                <button onclick="nav('settingsScreen')" class="glass p-6 rounded-[35px] flex flex-col items-center justify-center gap-2 ios-card shadow-sm"><span class="text-3xl">⚙️</span><span class="font-black">Опції</span></button>
            </div>
        </div>
    </div>

    <div id="specialistScreen" class="app-screen">
        <header class="p-4 flex items-center safe-pt"><button onclick="nav('menuScreen')" class="icon-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7"/></svg></button></header>
        <div class="flex-1 flex flex-col justify-center items-center px-10 gap-6">
            <h2 class="text-3xl font-black mb-4">Хто працює?</h2>
            <button onclick="setUserAndStart('Антон 🚀')" class="w-full py-6 rounded-[30px] font-black text-xl glass ios-card shadow-md text-blue-600">Антон 🚀</button>
            <button onclick="setUserAndStart('Марія 🌺')" class="w-full py-6 rounded-[30px] font-black text-xl glass ios-card shadow-md text-pink-600">Марія 🌺</button>
        </div>
    </div>

    <div id="inventoryScreen" class="app-screen">
        <header class="glass pb-4 rounded-b-[40px] shadow-sm safe-pt z-50">
            <div class="flex justify-between items-center px-4 pt-2">
                <button onclick="nav('menuScreen')" class="icon-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7"/></svg></button>
                <span id="displayUser" class="text-[10px] font-black bg-[var(--primary)] text-white px-3 py-1 rounded-full uppercase"></span>
                <div class="flex gap-2">
                    <button onclick="toggleSearch()" class="icon-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></button>
                    <button onclick="openAddModal()" class="w-10 h-10 bg-emerald-500 text-white rounded-full text-2xl font-light shadow-lg">+</button>
                </div>
            </div>
            <div id="searchBarContainer" class="px-5 hidden"><input type="text" id="s" placeholder="Пошук..." class="w-full bg-white/40 dark:bg-black/20 rounded-2xl p-3 outline-none font-bold mt-2" onkeyup="render()"></div>
            <div class="w-full overflow-x-auto flex gap-2 px-5 mt-4" id="categoryTabs"></div>
        </header>
        <main class="scroll-area px-4 pt-6 space-y-4">
            <div class="glass rounded-[30px] p-4 flex justify-between items-center bg-[var(--primary)]/5">
                <div class="pl-2">
                    <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">Локація</span>
                    <select id="l" class="bg-transparent font-black outline-none text-xl block text-[var(--primary)]"><option>Трускавець</option><option>Борислав</option><option>Дрогобич</option></select>
                </div>
                <div class="flex gap-3">
                    <button onclick="sendToTelegram()" class="glass w-12 h-12 flex items-center justify-center rounded-2xl text-xl">✈️</button>
                    <button onclick="saveData()" class="bg-[var(--primary)] text-white w-12 h-12 flex items-center justify-center rounded-2xl text-xl shadow-lg relative">💾</button>
                </div>
            </div>
            <div id="lst" class="space-y-3"></div>
        </main>
    </div>

    <div id="settingsScreen" class="app-screen">
        <header class="glass rounded-b-[40px] shadow-sm z-50 flex items-center px-4 settings-header">
            <button onclick="nav('menuScreen')" class="icon-btn -ml-2"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7"/></svg></button>
            <span class="font-black text-lg tracking-widest uppercase flex-1 text-center pr-10">Налаштування</span>
        </header>
        <main class="scroll-area px-5 pt-8 space-y-6">
            <div class="glass p-5 rounded-[30px] flex justify-between items-center">
                <div><h3 class="font-bold">Звук</h3><p class="text-[10px] opacity-40">Кліки та мелодії</p></div>
                <button onclick="toggleSetting('sound')" id="soundBtn" class="w-12 h-7 bg-gray-300 dark:bg-gray-700 rounded-full relative transition-colors"><div class="absolute top-1 left-1 w-5 h-5 bg-white rounded-full transition-all" id="soundDot"></div></button>
            </div>
            <div class="glass p-6 rounded-[35px]">
                <h3 class="font-bold mb-4">Тема</h3>
                <div class="grid grid-cols-5 gap-3 mb-6" id="themeGrid"></div>
            </div>
        </main>
    </div>

    <div id="archiveScreen" class="app-screen">
        <header class="glass rounded-b-[40px] shadow-sm z-50 flex items-center px-4 settings-header">
            <button onclick="nav('menuScreen')" class="icon-btn -ml-2"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 19l-7-7 7-7"/></svg></button>
            <span class="font-black text-lg tracking-widest uppercase flex-1 text-center pr-10">Архів</span>
        </header>
        <div id="arcView" class="scroll-area px-4 pt-6 space-y-4"></div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-8 backdrop-blur-md z-[10000]">
        <div class="w-full glass p-8 rounded-[40px] space-y-6">
            <h2 class="text-2xl font-black text-center text-emerald-500">Новий товар</h2>
            <input type="text" id="newItemName" placeholder="Назва..." class="w-full p-4 glass rounded-2xl outline-none font-bold text-center">
            <select id="newItemUnit" class="w-full p-4 glass rounded-2xl outline-none font-bold text-center"><option>кг</option><option>шт</option><option>л</option><option>мл</option></select>
            <div class="flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 p-4 glass rounded-2xl font-bold opacity-50">Відміна</button>
                <button onclick="saveNewItem()" class="flex-1 p-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">Додати</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAfSPpB0l2whC6A9q596fFU-VwYTluN1vY", authDomain: "romasyay-cloud.firebaseapp.com", databaseURL: "https://romasyay-cloud-default-rtdb.europe-west1.firebasedatabase.app", projectId: "romasyay-cloud", storageBucket: "romasyay-cloud.firebasestorage.app", messagingSenderId: "515733482243", appId: "1:515733482243:web:26e286e071fd3621859736" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        
        db.ref('inventories').on('value', (s) => { const d = s.val(); localStorage.setItem('romasyay_arc', JSON.stringify(d ? Object.values(d).sort((a,b)=>a.id-b.id) : [])); if(document.getElementById('archiveScreen').classList.contains('active')) loadArchive(); });

        const categories = ["Усі", "🍣 Суші", "🍕 Піца", "🍹 Бар", "🥣 Соуси", "📦 Упаковка", "🥬 Інше"];
        let currentCat = "Усі", PRODS = JSON.parse(localStorage.getItem('romasyay_v15_prods')) || [], vals = {}, currentUser = "";
        let settings = JSON.parse(localStorage.getItem('romasyay_settings')) || { sound: true, theme: 'theme-white', isDark: false };

        function applyTheme() {
            document.documentElement.className = settings.isDark ? 'dark' : 'light';
            document.body.className = settings.theme;
            document.getElementById('theme-color-meta').content = settings.isDark ? "#020617" : "#f8fafc";
            document.getElementById('soundBtn').classList.toggle('bg-blue-500', settings.sound);
            document.getElementById('soundDot').style.left = settings.sound ? '26px' : '4px';
        }

        function setTheme(t, d) { settings.theme = t; settings.isDark = d; localStorage.setItem('romasyay_settings', JSON.stringify(settings)); applyTheme(); }
        function toggleSetting(k) { settings[k] = !settings[k]; localStorage.setItem('romasyay_settings', JSON.stringify(settings)); applyTheme(); if(settings.sound) playNeutralClick(); }

        function nav(s) { document.querySelectorAll('.app-screen').forEach(e => e.classList.remove('active')); document.getElementById(s).classList.add('active'); if(settings.sound) playNeutralClick(); }
        function dismissSplash() { document.getElementById('splashScreen').classList.add('splash-hide'); nav('menuScreen'); }

        function initCategories() {
            document.getElementById('categoryTabs').innerHTML = categories.map(c => `
                <button onclick="setCategory('${c}')" class="px-5 py-2 rounded-full text-xs font-black transition-all ${c===currentCat?'bg-[var(--primary)] text-white shadow-md':'glass opacity-60'}">${c}</button>
            `).join('');
        }
        function setCategory(c) { currentCat = c; initCategories(); render(); }

        function render() {
            let f = PRODS;
            if(currentCat !== "Усі") f = f.filter(p => p.c === currentCat);
            const q = document.getElementById('s').value.toLowerCase();
            if(q) f = f.filter(p => p.n.toLowerCase().includes(q));

            document.getElementById('lst').innerHTML = f.sort((a,b)=>a.n.localeCompare(b.n,'uk')).map((p, i) => `
                <div class="glass rounded-[30px] p-5"><div class="flex justify-between items-start mb-4"><div><span class="text-[10px] font-black uppercase opacity-30 tracking-widest">${p.u}</span><h3 class="text-lg font-black leading-tight">${p.n}</h3></div><div class="text-3xl font-black text-[var(--primary)]">${vals[p.n]||0}</div></div><div class="flex gap-3"><input type="number" id="inp-${i}" placeholder="0" class="w-full rounded-2xl p-4 text-center font-black text-xl bg-white/40 dark:bg-black/20 outline-none"><button onclick="confirmBtn('${p.n}','inp-${i}')" class="bg-[var(--primary)] text-white px-8 rounded-2xl text-2xl shadow-lg">✓</button></div></div>`).join('');
        }

        function confirmBtn(n,id) { const i = document.getElementById(id); let v = parseFloat(i.value)||0; if(v!==0){vals[n]=(vals[n]||0)+v;i.value='';if(settings.sound)playNeutralClick();render();}}
        function startInventoryFlow() { if(currentUser) nav('inventoryScreen'); else nav('specialistScreen'); }
        function setUserAndStart(n) { currentUser = n; document.getElementById('displayUserMenu').innerText = n; document.getElementById('displayUser').innerText = n; document.getElementById('userBadgeContainer').classList.remove('hidden'); nav('inventoryScreen'); render(); }
        function logout() { currentUser = ""; document.getElementById('userBadgeContainer').classList.add('hidden'); nav('menuScreen'); }
        
        function saveData() {
            const items = PRODS.map(p => vals[p.n] > 0 ? {n:p.n, v:vals[p.n], u:p.u} : null).filter(x=>x);
            if(!items.length) return alert("Порожньо!");
            const r = {id:Date.now(), user:currentUser, loc:document.getElementById('l').value, dt:new Date().toLocaleString('uk-UA'), items};
            db.ref('inventories/'+r.id).set(r).then(() => { vals = {}; playPianoSuccess(); render(); alert("✅ Збережено!"); });
        }

        function loadArchive() {
            let a = JSON.parse(localStorage.getItem('romasyay_arc')) || [];
            document.getElementById('arcView').innerHTML = a.reverse().map(x => `
                <div class="glass rounded-[35px] p-6 relative mb-4">
                    <button onclick="downloadExcel(${x.id})" class="absolute top-4 right-4 w-10 h-10 bg-green-500/10 text-green-600 rounded-full flex items-center justify-center">📗</button>
                    <div class="mb-4 pr-12"><h4 class="font-black text-xl">${x.user} • ${x.loc}</h4><div class="text-[10px] font-bold opacity-40 uppercase">${x.dt}</div></div>
                    <div class="space-y-1 pt-3 border-t border-gray-300/20">${x.items.map(i=>`<div class="text-sm flex justify-between font-bold"><span>${i.n}</span><span class="text-[var(--primary)]">${i.v} ${i.u}</span></div>`).join('')}</div>
                </div>`).join('');
        }

        function playNeutralClick() { if(navigator.vibrate) navigator.vibrate(5); try { let c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=1200;g.gain.setValueAtTime(0.1,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.05)}catch(e){}}
        function playPianoSuccess() { try { let c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[523,659,1046].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+i*0.15+0.05);g.gain.linearRampToValueAtTime(0,t+i*0.15+0.6);o.connect(g);g.connect(c.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.7)})}catch(e){}}
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function toggleSearch() { const c=document.getElementById('searchBarContainer'); c.classList.toggle('hidden'); if(!c.classList.contains('hidden')) document.getElementById('s').focus(); }
        function downloadExcel(id) { let a=JSON.parse(localStorage.getItem('romasyay_arc')),i=a.find(x=>x.id===id); let d=[["Товар","Кількість","Од."]]; i.items.forEach(x=>d.push([x.n,x.v,x.u])); let s=XLSX.utils.aoa_to_sheet(d),b=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(b,s,"Inventory"); XLSX.writeFile(b,`Inventory_${i.loc}_${i.dt}.xlsx`); }

        window.onload = () => { applyTheme(); initCategories(); };
    </script>
</body>
</html>

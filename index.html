        .theme-pink { --bg-grad-1: #fdf2f8; --bg-grad-2: #fbcfe8; --text-main: #831843; --primary: #db2777; }
        .theme-lemon { --bg-grad-1: #fefce8; --bg-grad-2: #fef08a; --text-main: #713f12; --primary: #ca8a04; }

        .theme-blue-yellow { --bg-grad-1: #bae6fd; --bg-grad-2: #fef08a; --text-main: #1e293b; }
        .theme-black-blue { --bg-grad-1: #020617; --bg-grad-2: #0f172a; --text-main: #f8fafc; --primary: #60a5fa; }
        .theme-black-red { --bg-grad-1: #2a0808; --bg-grad-2: #000000; --text-main: #fecaca; --primary: #f87171; }
        .theme-green-black { --bg-grad-1: #064e3b; --bg-grad-2: #020617; --text-main: #a7f3d0; --primary: #34d399; }

        /* ФІКС ФОНУ (ПРИБИРАЄ БІЛИЙ НИЗ) */
        html { height: 100%; overflow: hidden; }
        body { 
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%); 
            min-height: 100%; height: 100vh; height: 100dvh;
            font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; 
            color: var(--text-main); transition: background 0.4s ease; 
            margin: 0; padding: 0; position: fixed; width: 100%; 
            overscroll-behavior: none; user-select: none; -webkit-user-select: none; 
        }

        .app-screen { display: none; height: 100%; width: 100%; position: absolute; top: 0; left: 0; flex-direction: column; }
        .app-screen.active { display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ФІКС ШАПКИ (ОПУСКАЄМО СТРІЛКУ) */
        header.glass { 
            padding-top: max(4rem, env(safe-area-inset-top)); 
            padding-bottom: 1.5rem; 
        }
        
        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); }
        .ios-card { transition: all 0.2s ease; cursor: pointer; } .ios-card:active { transform: scale(0.95); opacity: 0.8; }
        
        .icon-btn { width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .icon-btn svg { width: 30px; height: 30px; stroke-width: 2.5px; }
        
        #splashScreen { z-index: 9999; } .splash-hide { opacity: 0; visibility: hidden; }
        .unit-select { appearance: none; background: rgba(0, 122, 255, 0.1); padding: 4px 12px; border-radius: 10px; font-weight: 800; font-size: 12px; color: var(--primary); }

я Піці","Шинка традиційна для піци","Яблука","Яйце"];
        let PRODS = JSON.parse(localStorage.getItem('romasyay_v15_prods')) || defaultRawItems.map(n=>{let l=n.toLowerCase(),u="кг";if(l.includes("мл")||l.includes("соус")||l.includes("вода")||l.includes("пиво")||l.includes("вино")||l.includes("віскі")||l.includes("ром")||l.includes("сіроп")||l.includes("оцет")||l.includes("олія")||l.includes("лікер")||l.includes("чай")||l.includes("пепсі")||l.includes("тонік")||l.includes("сік"))u="мл";if(l.includes("шт")||l.includes("яйце")||l.includes("упаков")||l.includes("коробк")||l.includes("паличк")||l.includes("пакет")||l.includes("десерт")||l.includes("норі")||l.includes("порц")||l.includes("гр.")||l.includes("пергамент")||l.includes("тримач"))u="шт";return{n,u,c:getCategoryForName(n)}});
        
        let appSettings = JSON.parse(localStorage.getItem('romasyay_settings')) || { sound: true, haptic: true, themeName: 'theme-white', isDark: false };
        let vals = JSON.parse(localStorage.getItem('romasyay_current_session')) || {}, currentUser = "", startupSoundPlayed = false;

        function applyTheme(){document.documentElement.className=appSettings.isDark?'dark':'light';document.body.className=appSettings.themeName;document.getElementById('theme-color-meta').content=appSettings.isDark?"#020617":"#f8fafc";document.querySelectorAll('.theme-btn').forEach(b=>{b.classList.remove('ring-4','ring-[var(--primary)]','scale-110');if(b.dataset.theme===appSettings.themeName)b.classList.add('ring-4','ring-[var(--primary)]','scale-110')});}
        function setTheme(n,d){appSettings.themeName=n;appSettings.isDark=d;localStorage.setItem('romasyay_settings',JSON.stringify(appSettings));applyTheme();if(appSettings.sound)playNeutralClick();}
        function toggleSetting(k){appSettings[k]=!appSettings[k];localStorage.setItem('romasyay_settings',JSON.stringify(appSettings));if(k==='sound'&&appSettings.sound)playNeutralClick();if(k==='haptic'&&appSettings.haptic&&navigator.vibrate)navigator.vibrate(5);}
        function playStartupMelody(){if(!appSettings.sound)return;try{let c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[523.25,659.25,783.99,1046.50].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+i*0.1+0.05);g.gain.linearRampToValueAtTime(0,t+i*0.1+0.4);o.connect(g);g.connect(c.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.5)})}catch(e){}}
        function playNeutralClick(){if(appSettings.haptic&&navigator.vibrate)navigator.vibrate(5);if(!appSettings.sound)return;try{let c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.setValueAtTime(1200,c.currentTime);g.gain.setValueAtTime(0.1,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.05)}catch(e){}}
        function playPianoSuccess(){if(!appSettings.sound)return;try{let c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[523.25,659.25,1046.50].forEach((f,i)=>{let o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+i*0.15+0.05);g.gain.linearRampToValueAtTime(0,t+i*0.15+0.6);o.connect(g);g.connect(c.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.7)})}catch(e){}}

        function dismissSplash(){if(startupSoundPlayed)return;startupSoundPlayed=true;playStartupMelody();document.getElementById('splashScreen').classList.add('splash-hide');setTimeout(()=>{document.getElementById('splashScreen').style.display='none'},500);nav('menuScreen');}
        function nav(s){document.querySelectorAll('.app-screen').forEach(e=>e.classList.remove('active'));document.getElementById(s).classList.add('active');if(s!=='inventoryScreen')closeSearch();if(appSettings.sound&&s!=='menuScreen'&&startupSoundPlayed)playNeutralClick();}
        window.onload=()=>{document.getElementById('toggleSound').checked=appSettings.sound;document.getElementById('toggleHaptic').checked=appSettings.haptic;applyTheme();initCategories();updateUserBadge();};

        function updateUserBadge(){if(currentUser){document.getElementById('displayUserMenu').innerText=currentUser;document.getElementById('displayUser').innerText=currentUser;document.getElementById('userBadgeContainer').classList.remove('hidden');}else{document.getElementById('userBadgeContainer').classList.add('hidden');}}
        function startInventoryFlow(){if(appSettings.sound)playNeutralClick();currentUser?nav('inventoryScreen')&&render():nav('specialistScreen');}
        function setUserAndStart(n){currentUser=n;updateUserBadge();try{new(window.AudioContext||window.webkitAudioContext)().resume()}catch(e){}let l=localStorage.getItem('romasyay_current_loc');if(l)document.getElementById('l').value=l;nav('inventoryScreen');render();}
        function logout(){if(appSettings.sound)playNeutralClick();currentUser="";updateUserBadge();}
        function initCategories(){document.getElementById('categoryTabs').innerHTML=categories.map(c=>`<button onclick="setCategory('${c}')" id="cat-${c.replace(/\s+/g,'')}" class="whitespace-nowrap px-6 py-2.5 rounded-full text-xs font-black transition-all shadow-sm ${c==='Усі'?'bg-[var(--primary)] text-white':'glass text-[var(--text-main)]'}">${c}</button>`).join('');}
        function setCategory(c){currentCategory=c;document.querySelectorAll('#categoryTabs button').forEach(b=>{let a=b.id==='cat-'+c.replace(/\s+/g,'');b.className=`whitespace-nowrap px-6 py-2.5 rounded-full text-xs font-black transition-all shadow-sm ${a?'bg-[var(--primary)] text-white':'glass text-[var(--text-main)]'}`;});if(appSettings.sound)playNeutralClick();render();}
        function updateUnit(n,u){let i=PRODS.find(p=>p.n===n);if(i){i.u=u;localStorage.setItem('romasyay_v15_prods',JSON.stringify(PRODS));}}
        function saveSession(){localStorage.setItem('romasyay_current_session',JSON.stringify(vals));localStorage.setItem('romasyay_current_loc',document.getElementById('l').value);}
        function toggleSearch(){const c=document.getElementById('searchBarContainer'),i=document.getElementById('s');if(c.classList.contains('search-collapsed')){c.classList.remove('search-collapsed');c.classList.add('search-expanded');setTimeout(()=>i.focus(),300);}else{closeSearch();}if(appSettings.sound)playNeutralClick();}
        function closeSearch(){const c=document.getElementById('searchBarContainer'),i=document.getElementById('s');c.classList.remove('search-expanded');c.classList.add('search-collapsed');i.value='';render();}
        function render(){let f=PRODS;if(currentCategory!=='Усі')f=PRODS.filter(p=>p.c===currentCategory);const q=document.getElementById('s').value.toLowerCase();if(q)f=f.filter(p=>p.n.toLowerCase().includes(q));document.getElementById('lst').innerHTML=f.sort((a,b)=>a.n.localeCompare(b.n,'uk')).map((p,i)=>`<div class="glass rounded-[35px] p-6 shadow-sm border-white/20"><div class="flex justify-between items-start mb-5"><div><select onchange="updateUnit('${p.n}',this.value)" class="unit-select outline-none"><option value="кг"${p.u==='кг'?'selected':''}>КГ</option><option value="шт"${p.u==='шт'?'selected':''}>ШТ</option><option value="л"${p.u==='л'?'selected':''}>Л</option><option value="мл"${p.u==='мл'?'selected':''}>МЛ</option></select><h3 class="text-xl font-black mt-2 leading-tight">${p.n}</h3></div><div class="flex items-center gap-4"><span class="text-3xl font-black text-[var(--primary)]">${vals[p.n]||0}</span><button onclick="rst('${p.n}')" class="ios-card w-10 h-10 bg-gray-200/50 dark:bg-gray-700/50 rounded-full text-sm font-black">✕</button></div></div><div class="flex gap-4"><input type="number" id="inp-${i}" placeholder="Введіть..." class="w-full rounded-2xl p-5 text-center font-black text-2xl outline-none focus:ring-4 ring-[var(--primary)]/30 bg-white/50 dark:bg-black/20" onkeydown="if(event.key==='Enter')confirmBtn('${p.n}','inp-${i}')"><button onclick="confirmBtn('${p.n}','inp-${i}')" class="ios-card bg-[var(--primary)] text-white rounded-2xl px-10 text-3xl flex items-center shadow-lg">✓</button></div></div>`).join('');}
        function confirmBtn(n,id){let i=document.getElementById(id),v=parseFloat(i.value)||0;if(v!==0){vals[n]=(vals[n]||0)+v;i.value='';playNeutralClick();saveSession();render();}}
        function rst(n){if(confirm('Обнулити?')){vals[n]=0;saveSession();render();}}
        function openAddModal(){const m=document.getElementById('addModal'),c=document.getElementById('modalContent');m.classList.remove('hidden');setTimeout(()=>{m.classList.add('opacity-100');c.classList.remove('scale-90')},10);if(appSettings.sound)playNeutralClick();}
        function closeAddModal(){const m=document.getElementById('addModal'),c=document.getElementById('modalContent');m.classList.remove('opacity-100');c.classList.add('scale-90');setTimeout(()=>{m.classList.add('hidden');document.getElementById('newItemName').value=''},300);if(appSettings.sound)playNeutralClick();}
        function saveNewItem(){const n=document.getElementById('newItemName').value.trim(),u=document.getElementById('newItemUnit').value;if(!n)return alert("Назва!");PRODS.push({n,u,c:getCategoryForName(n)});localStorage.setItem('romasyay_v15_prods',JSON.stringify(PRODS));closeAddModal();render();}
        function saveData(){const i=PRODS.map(p=>vals[p.n]>0?{n:p.n,v:vals[p.n],u:p.u}:null).filter(x=>x);if(i.length===0)return alert("Порожньо!");const r={id:Date.now(),user:currentUser,loc:document.getElementById('l').value,dt:new Date().toLocaleString('uk-UA'),items:i};let a=JSON.parse(localStorage.getItem('romasyay_archive_opt'))||[];a.push(r);localStorage.setItem('romasyay_archive_opt',JSON.stringify(a));database.ref('inventories/'+r.id).set(r);vals={};saveSession();playPianoSuccess();render();setTimeout(()=>alert("Збережено в хмару!"),300);}
        function loadArchive(){let a=JSON.parse(localStorage.getItem('romasyay_archive_opt'))||[];if(a.length===0){document.getElementById('arcView').innerHTML='<p class="text-center opacity-40 py-20 font-black">Архів порожній</p>';return;}document.getElementById('arcView').innerHTML=a.reverse().map(x=>`<div class="glass rounded-[35px] p-8 shadow-md relative mb-6"><div class="absolute top-6 right-6 flex gap-4"><button onclick="downloadExcel(${x.id})" class="text-green-500 text-2xl">📗</button><button onclick="deleteCloudArchive(${x.id})" class="text-red-500 text-2xl">🗑</button></div><div class="mb-6"><div class="text-[10px] font-black opacity-40 uppercase tracking-widest text-[var(--primary)] mb-1">☁️ Синхронізовано</div><h4 class="font-black text-2xl">${x.user}</h4><div class="text-xs font-bold opacity-50">${x.loc} • ${x.dt}</div></div><div class="space-y-2 pt-6 border-t border-white/20">${x.items.map(i=>`<div class="text-base flex justify-between font-bold"><span>${i.n}</span><span class="font-black text-[var(--primary)]">${i.v} ${i.u}</span></div>`).join('')}</div></div>`).join('');}
        function downloadExcel(id){let a=JSON.parse(localStorage.getItem('romasyay_archive_opt'))||[],i=a.find(x=>x.id===id);if(!i)return;let d=[["Локація:",i.loc,"Дата:",i.dt],["Товар","Кількість","Одиниці"]];i.items.forEach(x=>d.push([x.n,x.v,x.u]));let s=XLSX.utils.aoa_to_sheet(d);let b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,s,"Інвентура");XLSX.writeFile(b,`Ромасяй_${i.loc}_${i.dt.replace(/[: ,]/g,'_')}.xlsx`);}
        function deleteCloudArchive(id){if(prompt("Пароль:")!=="100200300")return;database.ref('inventories/'+id).remove().then(()=>{let a=JSON.parse(localStorage.getItem('romasyay_archive_opt'))||[];a=a.filter(x=>x.id!==id);localStorage.setItem('romasyay_archive_opt',JSON.stringify(a));loadArchive();});}
        function sendToTelegram(){const i=PRODS.map(p=>vals[p.n]>0?`${p.n}: ${vals[p.n]} ${p.u}`:null).filter(x=>x);if(i.length===0)return;const t=`📊 ІНВЕНТУРА\n${currentUser} • ${document.getElementById('l').value}\n${new Date().toLocaleString('uk-UA')}\n\n${i.join('\n')}`;navigator.share?navigator.share({text:t}):window.location.href=`https://t.me/share/url?url=&text=${encodeURIComponent(t)}`;}
